<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#060807">
<title>Fxjaviargaez</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#060807;--ink:#EDF3EF;--muted:#7C8A81;--line:rgba(255,255,255,.10);
    --green:#53FC18;--green-dim:rgba(83,252,24,.55);--green-deep:#0C2117;--green-card:#0E1913;
    --idle:#101210;--idle-2:#0A0B0A;--idle-ic:rgba(255,255,255,.75);
    --hero-h:50dvh;--pad:24px;--font:"Helvetica Neue", Helvetica, Arial, sans-serif;
    --display:"Plus Jakarta Sans","Helvetica Neue",Arial,sans-serif;--kick:#53FC18;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{min-height:100%}
  body{background:var(--bg);color:var(--ink);font-family:var(--font);-webkit-font-smoothing:antialiased}

  .app{position:relative;min-height:100dvh;width:100%;max-width:480px;margin:0 auto;background:var(--bg);
    display:flex;flex-direction:column;overflow:hidden;animation:appIn .7s ease both}
  @keyframes appIn{from{opacity:0}to{opacity:1}}

  .fx{position:absolute;inset:0;width:100%;height:100%;z-index:0;pointer-events:none}

  .hero{position:relative;z-index:1;flex:0 0 var(--hero-h);overflow:hidden;background:#0a0c0a}
  .hero img{width:100%;height:100%;object-fit:cover;object-position:50% 8%;display:block;
    filter:saturate(.82) contrast(1.08) brightness(.92)}
  .hero::before{content:"";position:absolute;inset:0;background:linear-gradient(160deg, rgba(0,0,0,.35), rgba(6,8,7,.1) 55%);
    mix-blend-mode:multiply;pointer-events:none}
  .hero::after{content:"";position:absolute;inset:0;
    background:linear-gradient(to bottom, rgba(6,8,7,0) 42%, rgba(6,8,7,.6) 74%, #060807 100%);
    pointer-events:none}

  .hero .name{position:absolute;left:20px;right:20px;bottom:26px;z-index:2;text-align:center}
  .hero .name h1{font-family:var(--display);font-weight:600;font-size:clamp(19px,5.6vw,23px);
    letter-spacing:-.01em;text-transform:none;color:var(--ink);line-height:1.15;
    animation:titleIn 1s cubic-bezier(.2,.7,.2,1) both;animation-delay:.2s}
  @keyframes titleIn{
    0%{opacity:0;transform:translateY(10px);filter:blur(6px)}
    100%{opacity:1;transform:translateY(0);filter:blur(0)}
  }

  .content{position:relative;z-index:1;flex:1 1 auto;display:flex;flex-direction:column;
    padding:20px var(--pad) calc(26px + env(safe-area-inset-bottom))}
  .content>*{animation:rise .6s cubic-bezier(.2,.7,.2,1) both}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

  .menu{display:flex;flex-direction:column;gap:10px;width:100%;margin-top:2px}

  .card{position:relative;display:flex;align-items:center;gap:14px;text-decoration:none;color:var(--ink);
    border:1px solid var(--line);background:linear-gradient(165deg, var(--idle), var(--idle-2));
    border-radius:20px;padding:16px 17px;box-shadow:0 6px 18px rgba(0,0,0,.28);
    transition:transform .35s cubic-bezier(.2,.7,.2,1), border-color .35s ease, background .35s ease, box-shadow .35s ease}
  .card.active{transform:translateY(-2px);border-color:rgba(83,252,24,.55);
    background:linear-gradient(165deg, var(--green-deep), #0A1712);
    box-shadow:0 14px 30px rgba(0,0,0,.5), inset 0 0 0 1px rgba(83,252,24,.14)}
  @media(hover:hover){.card:hover{border-color:rgba(255,255,255,.2);transform:translateY(-1px)}}

  .card .ic{flex:0 0 auto;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);color:var(--idle-ic);
    transition:background .35s ease, border-color .35s ease, transform .35s ease, color .35s ease}
  .card.active .ic{background:rgba(83,252,24,.2);border-color:rgba(83,252,24,.45);color:var(--green);transform:scale(1.05)}
  .card .ic svg{width:21px;height:21px}

  .card.feat .t{font-size:clamp(18px,4.8vw,21px)}

  .card .body{display:flex;flex-direction:column;gap:3px;min-width:0;flex:1}
  .card .t{font-weight:600;font-size:clamp(16px,4.4vw,18px);letter-spacing:-.005em;line-height:1.15;
    display:flex;align-items:center;gap:8px;flex-wrap:wrap;color:var(--ink)}
  .card .s{font-weight:400;font-size:11.5px;color:var(--muted);line-height:1.25}

  .ar{flex:0 0 auto;width:18px;height:18px;opacity:.3;transition:opacity .4s ease, transform .4s cubic-bezier(.2,.7,.2,1)}
  .card.active .ar{opacity:1;transform:translateX(2px)}
  .ar svg{width:100%;height:100%}

  .tag{font-size:10px;font-weight:700;color:var(--ink);background:rgba(255,255,255,.1);padding:2px 8px;border-radius:100px;letter-spacing:.02em;border:1px solid rgba(255,255,255,.14)}
  .live{display:inline-flex;align-items:center;gap:5px;font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--kick);font-weight:700}
  .live i{width:6px;height:6px;border-radius:50%;background:var(--kick);box-shadow:0 0 8px var(--kick);animation:pulse 1.5s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.7)}}

  .foot{margin-top:auto;padding-top:24px;display:flex;flex-direction:column;align-items:center;gap:6px;animation-delay:.6s}
  .foot .line{width:26px;height:1px;background:rgba(255,255,255,.18)}
  .foot span{font-size:9.5px;letter-spacing:.26em;text-transform:uppercase;color:#4c554e;font-weight:600}

  @media (max-height:700px){:root{--hero-h:42dvh}}
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001ms !important;animation-iteration-count:1 !important;transition-duration:.05ms !important}
  }
</style>
</head>

/* ===== TARJETA ACTIVA QUE RECORRE EL MENÚ ===== */
(function(){
  const cards = Array.from(document.querySelectorAll('.card'));
  if(!cards.length) return;
  let idx = 0, paused = false, resumeT = null;
  const reduce = window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches;
  function setActive(i){ idx=i; cards.forEach((c,j)=>c.classList.toggle('active', j===i)); }
  setActive(0);
  if(reduce){ return; }
  setInterval(()=>{ if(!paused) setActive((idx+1)%cards.length); }, 2200);
  function resumeSoon(){ clearTimeout(resumeT); resumeT=setTimeout(()=>{paused=false;}, 3000); }
  cards.forEach((c,i)=>{
    c.addEventListener('pointerenter',()=>{ paused=true; setActive(i); });
    c.addEventListener('pointerdown',()=>{ paused=true; setActive(i); });
    c.addEventListener('pointerleave', resumeSoon);
    c.addEventListener('pointerup', resumeSoon);
  });
})();

/* ===== PARTÍCULAS AMBIENTALES VERDES ===== */
(function(){
  const c = document.getElementById('fx');
  if(!c) return;
  if(window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const ctx = c.getContext('2d');
  let w=0,h=0,dpr=1,parts=[];
  function size(){
    dpr = Math.min(window.devicePixelRatio||1, 2);
    const r = c.getBoundingClientRect();
    w=r.width; h=r.height; c.width=w*dpr; c.height=h*dpr; ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  function init(){
    const n = Math.max(30, Math.min(60, Math.round(w*h/9000)));
    parts = Array.from({length:n}, ()=>({
      x:Math.random()*w, y:Math.random()*h, r:Math.random()*1.4+.5,
      vy:-(Math.random()*.15+.03), vx:(Math.random()-.5)*.09,
      a:Math.random()*.32+.1, tw:Math.random()*Math.PI*2
    }));
  }
  function tick(){
    ctx.clearRect(0,0,w,h);
    for(const p of parts){
      p.y+=p.vy; p.x+=p.vx; p.tw+=0.018;
      if(p.y<-6){p.y=h+6;p.x=Math.random()*w;}
      if(p.x<-6)p.x=w+6; if(p.x>w+6)p.x=-6;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,6.283);
      const al = p.a*(0.6+0.4*Math.sin(p.tw));
      ctx.fillStyle='rgba(255,255,255,'+al+')'; ctx.fill();
    }
    requestAnimationFrame(tick);
  }
  size(); init();
  window.addEventListener('resize', ()=>{ size(); init(); });
  requestAnimationFrame(tick);
})();
</script>
